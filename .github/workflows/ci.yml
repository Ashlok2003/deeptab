name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, compile, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - name: Unit tests with coverage gate
        run: npm run coverage

  integration:
    name: Integration tests (extension host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Run extension tests under Xvfb
        run: xvfb-run -a npm run test:integration

  package:
    name: Package smoke (vsce)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build VSIX
        run: npx @vscode/vsce package --skip-license
      - uses: actions/upload-artifact@v4
        with:
          name: deeptab-vsix
          path: '*.vsix'
          retention-days: 7
